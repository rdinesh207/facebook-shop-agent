<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Connect your Facebook Shop with the AI-powered agent that manages your listings, inventory, and customer interactions automatically."
    />
    <title>Facebook Shop Agent — Connect Your Store</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,400&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- Animated background (persists across views) -->
    <div class="bg-canvas" aria-hidden="true">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
      <div class="grid-overlay"></div>
    </div>

    <!-- App root — views are injected here -->
    <div id="app" role="main">
      <!-- Initial loading state before JS kicks in -->
      <div class="splash-loader" id="splash-loader">
        <div class="splash-ring"></div>
      </div>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
